name: "Feature request"
description: "Suggest a new feature or improvement"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: "Describe the use case or pain point."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: "How would you like this to work?"
    validations:
      required: true
  - type: dropdown
    id: calendar_mode
    attributes:
      label: Which calendar mode is this for?
      options:
        - Single Date Picker
        - Date Range Picker
        - Mini Calendar
        - All modes
        - General / not specific to a mode
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered (optional)
      description: "Any workarounds or alternative approaches you've thought of?"
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or mockups (optional)
      description: "Drag & drop any visuals that help explain the idea."
